<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6 font-sans">
    <div class="max-w-2xl mx-auto space-y-8">
        <h1 class="text-xl font-black text-red-500 border-b border-zinc-900 pb-3 uppercase tracking-wider">Administration</h1>
        
        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-xl space-y-3">
            <h2 class="font-bold text-xs text-emerald-400 uppercase tracking-wide">1. Ajouter un Manga (Nom + Photo)</h2>
            <form action="/admin/ajouter-manga" method="POST" class="space-y-3">
                <input type="text" name="nom" placeholder="Nom du Manga" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-emerald-500 w-full">
                <input type="url" name="photo_url" placeholder="URL Photo de couverture" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-emerald-500 w-full">
                <textarea name="description" placeholder="Synopsis..." rows="2" class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-emerald-500 w-full"></textarea>
                <button type="submit" class="w-full bg-emerald-600 text-xs font-bold py-2 rounded">Créer le Manga</button>
            </form>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-xl space-y-3">
            <h2 class="font-bold text-xs text-amber-400 uppercase tracking-wide">2. Ajouter un Chapitre (Numéro + Titre + Couverture)</h2>
            <form action="/admin/ajouter-chapitre" method="POST" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" name="manga_id" placeholder="ID du Manga" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-amber-500 w-full">
                    <input type="number" name="numero" placeholder="Numéro Chapitre" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-amber-500 w-full">
                </div>
                <input type="text" name="titre" placeholder="Titre du Chapitre" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-amber-500 w-full">
                <input type="url" name="couverture_chapitre_url" placeholder="URL Image Couverture du Chapitre" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-amber-500 w-full">
                <button type="submit" class="w-full bg-amber-600 text-xs font-bold py-2 rounded">Créer le Chapitre</button>
            </form>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-xl space-y-3">
            <h2 class="font-bold text-xs text-sky-400 uppercase tracking-wide">3. Injecter les Cases du Chapitre</h2>
            <form action="/admin/ajouter-cases" method="POST" class="space-y-3">
                <input type="number" name="chapitre_id" placeholder="ID unique du Chapitre" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-sky-500 w-full">
                <textarea name="urls_cases" placeholder="URLs des cases (séparées par une virgule `,` )" rows="2" required class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-sky-500 w-full"></textarea>
                <textarea name="narrations_cases" placeholder="Narrations (séparées par un point-virgule `;` )" rows="2" class="bg-black p-2 text-xs rounded border border-zinc-800 focus:outline-none focus:border-sky-500 w-full"></textarea>
                <button type="submit" class="w-full bg-sky-600 text-xs font-bold py-2 rounded">Injecter les Cases</button>
            </form>
        </div>
        <div class="text-center">
            <a href="/" class="text-xs text-zinc-600 underline">← Retour Accueil</a>
        </div>
    </div>
</body>
</html>
