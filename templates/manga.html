<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ manga[1] }} - Manga Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans p-4 md:p-8">
    <div class="max-w-2xl mx-auto space-y-6">
        <a href="/" class="text-xs text-zinc-400 hover:text-white transition block">← Retour à l'accueil</a>
        
        <div class="flex flex-col sm:flex-row gap-5 bg-zinc-900 border border-zinc-900 p-5 rounded-2xl">
            <div class="w-full sm:w-40 aspect-[3/4] bg-zinc-800 rounded-xl overflow-hidden flex-shrink-0">
                <img src="{{ manga[2] }}" alt="{{ manga[1] }}" class="w-full h-full object-cover">
            </div>
            <div class="space-y-2">
                <h1 class="text-xl font-black uppercase tracking-wide">{{ manga[1] }}</h1>
                <p class="text-xs text-zinc-400 leading-relaxed">{{ manga[3] or 'Aucun synopsis disponible.' }}</p>
            </div>
        </div>

        <div class="space-y-3">
            <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">Chapitres Disponibles :</h2>
            <div class="grid gap-2">
                {% for c in chapitres %}
                <a href="/manga/{{ manga[0] }}/{{ c[0] }}/1" class="flex items-center gap-4 bg-zinc-900 border border-zinc-900 hover:border-zinc-800 p-3 rounded-xl transition group">
                    <div class="w-12 h-12 bg-zinc-800 rounded-lg overflow-hidden flex-shrink-0">
                        <img src="{{ c[3] }}" alt="Ch.{{ c[1] }}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 class="text-sm font-bold group-hover:text-red-400 transition">Chapitre {{ c[1] }}</h3>
                        <p class="text-xs text-zinc-500 truncate max-w-md">{{ c[2] }}</p>
                    </div>
                </a>
                {% else %}
                <p class="text-xs text-zinc-600 py-4">Aucun chapitre publié pour le moment.</p>
                {% endfor %}
            </div>
        </div>
    </div>

    <script type="text/javascript">
        aclib.runAutoTag({
            zoneId: '3acdcanlnw',
        });
    </script>
</body>
</html>
