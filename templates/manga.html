<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ manga[1] }} - Chapitres</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto space-y-8">
        <a href="/" class="bg-zinc-900 text-xs px-4 py-2 rounded border border-zinc-800 transition hover:bg-zinc-800 inline-block">← Accueil</a>
        
        <div class="flex flex-col sm:flex-row gap-6 bg-zinc-950 p-6 rounded-xl border border-zinc-900 items-center sm:items-start">
            <img src="{{ manga[2] }}" alt="{{ manga[1] }}" class="w-36 rounded-lg object-cover aspect-[3/4] border border-zinc-800">
            <div class="space-y-2 text-center sm:text-left">
                <h1 class="text-2xl font-black">{{ manga[1] }}</h1>
                <p class="text-xs text-zinc-400 leading-relaxed">{{ manga[3] }}</p>
            </div>
        </div>

        <div class="bg-zinc-950 p-6 rounded-xl border border-zinc-900 space-y-4">
            <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-wider border-b border-zinc-900 pb-2">Liste des Chapitres</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {% for ch in chapitres %}
                <a href="/manga/{{ manga[0] }}/{{ ch[0] }}/1" class="bg-zinc-900 hover:bg-zinc-800/40 border border-zinc-800 p-4 rounded-xl flex gap-4 items-center group transition">
                    <img src="{{ ch[3] }}" alt="Couverture" class="w-10 h-14 object-cover rounded border border-zinc-800 bg-black">
                    <div>
                        <h3 class="font-bold text-xs text-zinc-200 group-hover:text-red-500 transition">Chapitre {{ ch[1] }} (ID: {{ ch[0] }})</h3>
                        <p class="text-[11px] text-zinc-500 line-clamp-1">{{ ch[2] }}</p>
                    </div>
                </a>
                {% else %}
                <p class="text-xs text-zinc-600 py-2">Aucun chapitre n'est disponible.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
