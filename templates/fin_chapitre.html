<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin du Chapitre</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col justify-center items-center p-4">
    <div class="max-w-xs w-full bg-zinc-950 border border-zinc-900 p-6 rounded-xl text-center space-y-4 shadow-xl">
        <h1 class="text-sm font-black tracking-wide uppercase text-red-500">Chapitre Terminé</h1>
        <p class="text-xs text-zinc-500">Fin de la narration disponible pour ce chapitre.</p>
        <div class="flex flex-col gap-2 pt-2">
            <a href="/manga/{{ manga_id }}" class="bg-zinc-900 hover:bg-zinc-800 text-xs py-2 font-bold rounded-lg transition border border-zinc-800">Retour aux chapitres</a>
            <a href="/" class="text-[11px] text-zinc-600 hover:text-zinc-400">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
