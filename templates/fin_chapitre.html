<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin du Chapitre</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 p-8 rounded-2xl text-center space-y-6 shadow-2xl">
        <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div class="space-y-2">
            <h1 class="text-xl font-black uppercase tracking-wider">Chapitre Terminé !</h1>
            <p class="text-xs text-zinc-400">Vous avez lu toutes les cases disponibles pour ce chapitre.</p>
        </div>
        <div class="pt-2">
            <a href="/manga/{{ manga_id }}" class="block w-full bg-zinc-800 hover:bg-zinc-700 text-xs font-bold py-3 rounded-xl transition border border-zinc-700 text-zinc-200 hover:text-white">Retour aux chapitres</a>
        </div>
    </div>

    <script type="text/javascript">
        aclib.runAutoTag({
            zoneId: '3acdcanlnw',
        });
    </script>
</body>
</html>
