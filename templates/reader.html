<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapitre {{ num_chapitre }} - Page {{ numero_page }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .unselectable {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col justify-between unselectable">
    
    <div class="w-full bg-zinc-950/80 backdrop-blur border-b border-zinc-900 p-4 flex justify-between items-center z-10">
        <a href="/manga/{{ manga_id }}" class="text-xs bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded text-zinc-400 hover:text-white transition">
            ✕ Quitter
        </a>
        <span class="text-xs font-bold uppercase tracking-widest text-zinc-500">
            Chapitre {{ num_chapitre }} — <span class="text-white">Page {{ numero_page }}</span>
        </span>
        <div class="w-16"></div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center p-2 max-w-2xl mx-auto w-full relative">
        <div id="manga-click-zone" class="w-full block group relative cursor-pointer">
            <img src="{{ image_url }}" alt="Manga case" class="w-full h-auto max-h-[70vh] object-contain mx-auto rounded-lg shadow-2xl transition duration-300 group-hover:opacity-95">
        </div>
    </div>

    <div class="w-full bg-zinc-950 border-t border-zinc-900 p-5 pb-8">
        <div class="max-w-xl mx-auto space-y-4">
            <p id="narration-text" class="text-sm md:text-base text-zinc-200 text-center font-medium leading-relaxed tracking-wide italic px-4">
                {% if narration %}" {{ narration }} "{% else %}(Laissez-vous guider par le visuel){% endif %}
            </p>
            
            <div class="flex justify-center">
                <button id="action-btn" class="bg-white text-black font-black text-xs uppercase px-6 py-2.5 rounded-full tracking-wider hover:bg-zinc-200 transition">
                    {% if a_un_suivant %}Continuer →{% else %}Terminer le Chapitre{% endif %}
                </button>
            </div>
        </div>
    </div>

<script>
        let parole = null;

        function lancerNarration() {
            // On stoppe tout son en cours pour éviter les chevauchements
            window.speechSynthesis.cancel();

            // 1. On prend le vrai texte propre affiché à l'écran
            var texteOriginal = document.getElementById('texteNarration').innerText;
            var textePourLaVoix = texteOriginal;

            // 2. 🛠️ LE DICTIONNAIRE PHONÉTIQUE (Tu peux ajouter des mots ici)
            var corrections = {
                "Dawn": "Dône",
                "Romance": "Romane-ce",
                "One Piece": "Ouanne Pîce",
                "Luffy": "Loufi",                                                                                                     "Shanks": "Chankse",
                "Zoro": "Zoro"
            };
                                                                                                                                  // Remplacement automatique des mots anglais par leur prononciation française
            for (var motAnglais in corrections) {                                                                                     var expressionReguliere = new RegExp(motAnglais, "gi");
                textePourLaVoix = textePourLaVoix.replace(expressionReguliere, corrections[motAnglais]);
            }

            // 3. On crée l'objet de parole avec le texte corrigé
            parole = new SpeechSynthesisUtterance(textePourLaVoix);
            parole.lang = 'fr-FR';
            parole.rate = 0.95; // Vitesse légèrement ralentie pour un effet plus cinéma
            parole.pitch = 1.0;

            // Sélection de la meilleure voix disponible (Google / Natural)
            var voixDisponibles = window.speechSynthesis.getVoices();
            let voixTrouvee = voixDisponibles.find(v => v.lang.includes('fr') && (v.name.includes('Google') || v.name>

            if (!voixTrouvee) {
                voixTrouvee = voixDisponibles.find(v => v.lang.includes('fr'));
            }

            if (voixTrouvee) {
                parole.voice = voixTrouvee;
            }

            // Enchaînement automatique des cases à la fin de la phrase
            parole.onend = function(event) {
                setTimeout(function() {
                    window.location.href = "/manga/{{ manga_id }}/chapitre/{{ num_chapitre }}/case/{{ num_case + 1 }}>
                }, 800); // Petite pause dramatique de 0.8s
            };                                                                                                        
            // On lance la voix
            window.speechSynthesis.speak(parole);
        }

        // Lancement automatique au chargement
        window.onload = function() {
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = lancerNarration;
            }
            setTimeout(lancerNarration, 600);
        };

        // Clic de sécurité sur mobile pour activer l'audio
        document.body.addEventListener('click', function() {
            lancerNarration();
        }, { once: true });
    </script>
   
</body>
</html>
