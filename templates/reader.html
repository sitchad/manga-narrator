<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapitre {{ num_chapitre }} - Page {{ numero_page }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .unselectable {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col justify-between unselectable">
    
    <div class="w-full bg-zinc-950/80 backdrop-blur border-b border-zinc-900 p-4 flex justify-between items-center z-10">
        <a href="/manga/{{ manga_id }}" class="text-xs bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded text-zinc-400 hover:text-white transition">
            ✕ Quitter
        </a>
        <span class="text-xs font-bold uppercase tracking-widest text-zinc-500">
            Chapitre {{ num_chapitre }} — <span class="text-white">Page {{ numero_page }}</span>
        </span>
        <div class="w-16"></div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center p-2 max-w-2xl mx-auto w-full relative">
        <div id="manga-click-zone" class="w-full block group relative cursor-pointer">
            <img src="{{ image_url }}" alt="Manga case" class="w-full h-auto max-h-[70vh] object-contain mx-auto rounded-lg shadow-2xl transition duration-300 group-hover:opacity-95">
        </div>
    </div>

    <div class="w-full bg-zinc-950 border-t border-zinc-900 p-5 pb-8">
        <div class="max-w-xl mx-auto space-y-4">
            <p id="narration-text" class="text-sm md:text-base text-zinc-200 text-center font-medium leading-relaxed tracking-wide italic px-4">
                {% if narration %}" {{ narration }} "{% else %}(Laissez-vous guider par le visuel){% endif %}
            </p>
            
            <div class="flex justify-center">
                <button id="action-btn" class="bg-white text-black font-black text-xs uppercase px-6 py-2.5 rounded-full tracking-wider hover:bg-zinc-200 transition">
                    {% if a_un_suivant %}Continuer →{% else %}Terminer le Chapitre{% endif %}
                </button>
            </div>
        </div>
    </div>

    <script>
        const clickZone = document.getElementById('manga-click-zone');
        const actionBtn = document.getElementById('action-btn');
        
        // Cible de redirection calculée par le serveur de manière fluide
        const nextUrl = "/manga/{{ manga_id }}/{{ chapitre_id }}/{{ numero_page + 1 }}";

        function avancerNarration() {
            // C'est le JavaScript qui intercepte le clic et envoie vers la page suivante
            window.location.href = nextUrl;
        }

        // Le clic sur l'image ou sur le bouton déclenche le script JS de navigation
        clickZone.addEventListener('click', avancerNarration);
        actionBtn.addEventListener('click', avancerNarration);
    </script>

    <script type="text/javascript">
        aclib.runAutoTag({
            zoneId: '3acdcanlnw',
        });
    </script>
</body>
</html>
