<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen flex flex-col justify-between select-none overflow-x-hidden">
    <header class="bg-zinc-950/80 border-b border-zinc-900 p-4 sticky top-0 z-50 flex justify-between items-center px-6">
        <a href="/manga/{{ manga_id }}" class="text-zinc-500 hover:text-white text-xs font-bold uppercase">← Quitter</a>
        <div class="text-center">
            <span class="text-xs uppercase text-red-600 font-black block">Chapitre {{ num_chapitre }}</span>
            <span class="text-[10px] text-zinc-500 font-bold">Case {{ numero_page }}</span>
        </div>
        <div class="w-12"></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-xl mx-auto w-full cursor-pointer" id="click-zone">
        {% if narration %}
        <div class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl shadow-2xl mb-6 text-center text-xs md:text-sm font-medium text-zinc-200 leading-relaxed fade-in">
            {{ narration }}
        </div>
        {% endif %}

        <div class="relative w-full rounded-xl overflow-hidden shadow-2xl bg-zinc-950 flex justify-center items-center border border-zinc-900">
            <img src="{{ image_url }}" alt="Case {{ numero_page }}" class="max-w-full max-h-[68vh] object-contain fade-in">
        </div>

        <p class="text-[9px] text-zinc-700 mt-4 tracking-widest uppercase animate-pulse">Appuie pour faire défiler le rythme</p>
    </main>

    <script>
        const mId = "{{ manga_id }}";
        const cId = "{{ chapitre_id }}";
        const pActuelle = parseInt("{{ numero_page }}");
        document.getElementById('click-zone').addEventListener('click', () => {
            window.location.href = `/manga/${mId}/${cId}/${pActuelle + 1}`;
        });
    </script>
</body>
</html>
