<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-zinc-900 pb-4">
            <h1 class="text-2xl font-black text-red-500 uppercase tracking-wider">Manga Hub</h1>
            <a href="/admin" class="text-xs bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded text-zinc-400 hover:text-white">Admin</a>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            {% for m in mangas %}
            <a href="/manga/{{ m[0] }}" class="group bg-zinc-900 border border-zinc-900 rounded-xl overflow-hidden hover:border-zinc-700 transition duration-300 block">
                <div class="aspect-[3/4] bg-zinc-800 relative overflow-hidden">
                    <img src="{{ m[2] }}" alt="{{ m[1] }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <div class="p-3">
                    <h2 class="font-bold text-sm truncate group-hover:text-red-400 transition">{{ m[1] }}</h2>
                </div>
            </a>
            {% else %}
            <p class="text-xs text-zinc-500 col-span-full py-8 text-center">Aucun manga disponible pour le moment.</p>
            {% endfor %}
        </div>
    </div>

    <script type="text/javascript">
        aclib.runAutoTag({
            zoneId: '3acdcanlnw',
        });
    </script>
</body>
</html>
