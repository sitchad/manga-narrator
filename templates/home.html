<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Cine</title>
</head>
<body style="background: #0b0b0c; color: white; font-family: sans-serif; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff4757; padding-bottom: 10px;">
        <h1>Manga<span style="color: #ff4757;">Cine</span></h1>
        {% if session.get('is_admin') %}
        <div>
            <a href="/admin" style="background: #27272a; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; margin-right: 10px;">Admin ⚙️</a>
            <a href="/logout" style="background: #ff4757; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px;">Quitter 🚪</a>
        </div>
        {% else %}
        <a href="/login" style="color: #a1a1aa; text-decoration: none;">Connexion Admin 🔒</a>
        {% endif %}
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px;">
        {% for manga in mangas %}
        <div style="background: #18181b; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            <img src="{{ manga[2] }}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 6px;">
            <h3>{{ manga[1] }}</h3>
            <p style="color: #a1a1aa; font-size: 0.9rem; height: 50px; overflow: hidden;">{{ manga[3] }}</p>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: #ffb81c;">⭐ {{ manga[4] }} ({{ manga[5] }})</span>
                <a href="/manga/{{ manga[0] }}/page/1" style="background: #ff4757; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-weight: bold;">Lire 🎙️</a>
            </div>
        </div>
        {% else %}
        <p style='color: #a1a1aa; text-align: center; grid-column: 1/-1;'>Aucun manga disponible pour le moment.</p>
        {% endfor %}
    </div>
</body>
</html>
