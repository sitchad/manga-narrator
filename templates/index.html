<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">
    <header class="p-6 border-b border-zinc-900 bg-zinc-950 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wider text-red-600">MANGA<span class="text-white font-light">NARRATOR</span></h1>
        <a href="/admin" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1.5 rounded transition font-bold text-zinc-300">Admin</a>
    </header>
    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-sm font-bold mb-6 text-zinc-400 border-l-4 border-red-600 pl-3 uppercase tracking-wider">Liste des Mangas</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            {% for manga in mangas %}
            <a href="/manga/{{ manga[0] }}" class="group bg-zinc-950 border border-zinc-900 rounded-lg overflow-hidden block hover:border-zinc-700 transition">
                <div class="aspect-[3/4] bg-zinc-900 overflow-hidden">
                    <img src="{{ manga[2] }}" alt="{{ manga[1] }}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                </div>
                <div class="p-3 text-center">
                    <h3 class="font-bold text-xs text-zinc-200 group-hover:text-red-500 transition line-clamp-1">{{ manga[1] }}</h3>
                </div>
            </a>
            {% else %}
            <p class="text-zinc-600 text-center col-span-full text-xs py-10">Aucun manga disponible.</p>
            {% endfor %}
        </div>
    </main>
</body>
</html>
