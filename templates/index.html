<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Manga Narrator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .manga-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Ma Bibliothèque Manga</h1>
    {% for manga in mangas %}
        <div class="manga-card">
            <h3>{{ manga[1] }}</h3> <img src="{{ manga[2] }}" width="100" alt="Cover">
        </div>
    {% endfor %}
</body>
</html>
