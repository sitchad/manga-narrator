<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ajouter des Cases</title>
</head>
<body style="background: #060607; color: white; font-family: sans-serif; padding: 20px;">
    <div style="max-width: 600px; margin: 40px auto; background: #111113; padding: 30px; border-radius: 12px; border: 1px solid #222225;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin: 0; color: #ff4757;">➕ Ajouter une Case</h2>
            <a href="/admin" style="color: #a1a1aa; text-decoration: none;">➡️ Admin Mangas</a>
        </div>
        <form action="/admin/page" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #cbd5e1;">1. Choisir le Manga :</label>
                <select name="manga_id" required style="background: #1f1f23; color: white; border: 1px solid #3f3f46; padding: 12px; border-radius: 6px;">
                    <option value="">-- Sélectionner un manga --</option>
                    {% for manga in mangas %}
                        <option value="{{ manga[0] }}">{{ manga[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display: flex; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                    <label style="color: #cbd5e1;">2. Numéro du Chapitre :</label>
                    <input type="number" name="num_chapitre" placeholder="Ex: 1" required style="background: #1f1f23; color: white; border: 1px solid #3f3f46; padding: 12px; border-radius: 6px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                    <label style="color: #cbd5e1;">3. Numéro de la Case :</label>
                    <input type="number" name="num_case" placeholder="Ex: 1" required style="background: #1f1f23; color: white; border: 1px solid #3f3f46; padding: 12px; border-radius: 6px;">
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #cbd5e1;">4. URL de la Case découpée :</label>
                <input type="url" name="image_url" placeholder="https://lien-image.com/case.png" required style="background: #1f1f23; color: white; border: 1px solid #3f3f46; padding: 12px; border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #cbd5e1;">5. Texte de la Bulle / Narration :</label>
                <textarea name="texte_narration" rows="4" placeholder="Texte qui sera lu pour cette case..." required style="background: #1f1f23; color: white; border: 1px solid #3f3f46; padding: 12px; border-radius: 6px; resize: vertical;"></textarea>
            </div>
            <button type="submit" style="background: #ff4757; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer;">💾 Enregistrer la case</button>
        </form>
    </div>
</body>
</html>
